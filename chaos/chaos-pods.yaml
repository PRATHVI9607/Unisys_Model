apiVersion: v1
kind: Pod
metadata:
  name: ransomware-simulator
  namespace: demo
  labels:
    app: ransomware-simulator
    kubeheal.io/chaos: "true"
spec:
  restartPolicy: Never
  containers:
    - name: simulator
      image: kubeheal/ransomware-simulator:v4
      imagePullPolicy: IfNotPresent
      command: ["/usr/bin/python3", "/app/ransomware-simulator.py"]
      args:
        - "--data-dir=/data"
        - "--num-files=100"
        - "--rate=180"
        - "--duration=60"
      volumeMounts:
        - name: data
          mountPath: /data
      securityContext:
        runAsUser: 0
        privileged: true
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 1000m
          memory: 512Mi
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: victim-data
---
apiVersion: v1
kind: Pod
metadata:
  name: drift-injector
  namespace: demo
  labels:
    app: drift-injector
    kubeheal.io/chaos: "true"
spec:
  restartPolicy: Never
  containers:
    - name: injector
      image: nginx:1.21
      command:
        - /bin/sh
        - -c
        - |
          echo "Starting drift injection...";
          sleep 30;
          kubectl patch deployment victim-app -n demo --type=merge -p '{"spec":{"template":{"spec":{"containers":[{"name":"app","resources":{"limits":{"cpu":"50m"}}]}}}}';
          echo "CPU drift injected (500m -> 50m)";
          sleep 60;
          exit 0
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi