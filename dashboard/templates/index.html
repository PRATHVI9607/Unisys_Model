<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KubeHeal Dashboard</title>
    <link rel="stylesheet" href="/static/event-details.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 116, 139, 0.2);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-title h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .status-indicator.disconnected {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 116, 139, 0.2);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(100, 116, 139, 0.4);
            background: rgba(15, 23, 42, 0.8);
        }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .stat-value.high-risk {
            color: #ef4444;
        }

        .events-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .events-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 116, 139, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            background: rgba(30, 41, 59, 0.8);
            border-bottom: 1px solid rgba(100, 116, 139, 0.2);
            padding: 16px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .events-list {
            max-height: 400px;
            overflow-y: auto;
            padding: 16px;
        }

        .event-item {
            background: rgba(51, 65, 85, 0.3);
            border-left: 3px solid #3b82f6;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
            font-size: 12px;
            animation: slideIn 0.3s ease;
        }

        .event-item.security {
            border-left-color: #ef4444;
        }

        .event-item.high-risk {
            background: rgba(239, 68, 68, 0.1);
            border-left-color: #dc2626;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .event-id {
            color: #60a5fa;
            font-weight: 500;
        }

        .event-risk {
            font-weight: 600;
        }

        .event-risk.high {
            color: #ef4444;
        }

        .event-risk.medium {
            color: #f59e0b;
        }

        .event-risk.low {
            color: #10b981;
        }

        .event-target {
            color: #cbd5e1;
            margin-top: 4px;
        }

        .event-time {
            color: #64748b;
            font-size: 10px;
            margin-top: 4px;
        }

        .combined-events {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 116, 139, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        .combined-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .combined-item {
            border-bottom: 1px solid rgba(100, 116, 139, 0.1);
            padding: 16px;
            display: flex;
            gap: 12px;
            transition: background 0.2s;
        }

        .combined-item:hover {
            background: rgba(30, 41, 59, 0.5);
        }

        .combined-badge {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .combined-badge.health {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .combined-badge.security {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .combined-content {
            flex: 1;
        }

        .combined-target {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .combined-details {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #94a3b8;
        }

        .combined-score {
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(51, 65, 85, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(100, 116, 139, 0.4);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 0.6);
        }

        @media (max-width: 1200px) {
            .events-section {
                grid-template-columns: 1fr;
            }
        }

        .connection-status {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: #ef4444;
            animation: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <h1>🛡️ KubeHeal Dashboard</h1>
                <div class="status-indicator" id="statusIndicator"></div>
            </div>
            <div class="connection-status">
                <div class="status-dot" id="connectionDot"></div>
                <span id="connectionText">Connecting...</span>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Health Events</div>
                <div class="stat-value" id="healthEventCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Security Events</div>
                <div class="stat-value" id="securityEventCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">High Risk (Health)</div>
                <div class="stat-value high-risk" id="highRiskHealth">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">High Risk (Security)</div>
                <div class="stat-value high-risk" id="highRiskSecurity">0</div>
            </div>
        </div>

        <div class="events-section">
            <div class="events-panel">
                <div class="panel-header">Health Assessments</div>
                <div class="events-list" id="healthEvents">
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <p>No health events yet</p>
                    </div>
                </div>
            </div>

            <div class="events-panel">
                <div class="panel-header">Security Events</div>
                <div class="events-list" id="securityEvents">
                    <div class="empty-state">
                        <div class="empty-state-icon">🔒</div>
                        <p>No security events yet</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="combined-events">
            <div class="panel-header">All Events Timeline</div>
            <div class="combined-list" id="combinedEvents">
                <div class="empty-state">
                    <div class="empty-state-icon">📈</div>
                    <p>No events to display</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 10;

        function formatRiskScore(score) {
            const percent = Math.round(score * 100);
            return `${percent}%`;
        }

        function getRiskClass(score) {
            if (score > 0.7) return 'high';
            if (score > 0.4) return 'medium';
            return 'low';
        }

        function formatTime(isoString) {
            try {
                const date = new Date(isoString);
                return date.toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    second: '2-digit'
                });
            } catch {
                return 'Unknown';
            }
        }

        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                
                document.getElementById('healthEventCount').textContent = stats.total_health_events;
                document.getElementById('securityEventCount').textContent = stats.total_security_events;
                document.getElementById('highRiskHealth').textContent = stats.high_risk_health_events;
                document.getElementById('highRiskSecurity').textContent = stats.high_risk_security_events;
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }

        async function fetchEvents() {
            try {
                const [healthRes, securityRes, combinedRes] = await Promise.all([
                    fetch('/api/health-events?limit=10'),
                    fetch('/api/security-events?limit=10'),
                    fetch('/api/combined-events?limit=20')
                ]);

                const health = await healthRes.json();
                const security = await securityRes.json();
                const combined = await combinedRes.json();

                updateHealthEvents(health.events);
                updateSecurityEvents(security.events);
                updateCombinedEvents(combined.events);
            } catch (error) {
                console.error('Error fetching events:', error);
            }
        }

        function updateHealthEvents(events) {
            const container = document.getElementById('healthEvents');
            if (events.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><p>No health events yet</p></div>';
                return;
            }

            container.innerHTML = events.slice(-5).reverse().map(event => `
                <div class="event-item ${event.risk_score > 0.7 ? 'high-risk' : ''}" style="cursor: pointer;" onclick="openEventDetails('${event.event_id}')">
                    <div class="event-header">
                        <span class="event-id">${event.event_id.substring(0, 20)}...</span>
                        <span class="event-risk ${getRiskClass(event.risk_score)}">${formatRiskScore(event.risk_score)}</span>
                    </div>
                    <div class="event-target">${event.target.namespace}/${event.target.name}</div>
                    <div class="event-time">${formatTime(event.timestamp)}</div>
                </div>
            `).join('');
        }

        function updateSecurityEvents(events) {
            const container = document.getElementById('securityEvents');
            if (events.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔒</div><p>No security events yet</p></div>';
                return;
            }

            container.innerHTML = events.slice(-5).reverse().map(event => `
                <div class="event-item security ${event.risk_score > 0.7 ? 'high-risk' : ''}" style="cursor: pointer;" onclick="openEventDetails('${event.event_id}')">
                    <div class="event-header">
                        <span class="event-id">${event.event_id.substring(0, 20)}...</span>
                        <span class="event-risk ${getRiskClass(event.risk_score)}">${formatRiskScore(event.risk_score)}</span>
                    </div>
                    <div class="event-target">${event.target.namespace || 'N/A'}/${event.target.pod || event.target.name}</div>
                    <div class="event-time">${formatTime(event.timestamp)}</div>
                </div>
            `).join('');
        }

        function updateCombinedEvents(events) {
            const container = document.getElementById('combinedEvents');
            if (events.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📈</div><p>No events to display</p></div>';
                return;
            }

            container.innerHTML = events.slice(-20).map(event => {
                const isHealth = event.type === 'health';
                const badge = isHealth ? '📊' : '🔒';
                const badgeClass = isHealth ? 'health' : 'security';
                const label = isHealth ? 'Health' : 'Security';
                
                return `
                    <div class="combined-item" style="cursor: pointer;" onclick="openEventDetails('${event.event_id}')">
                        <div class="combined-badge ${badgeClass}">${badge}</div>
                        <div class="combined-content">
                            <div class="combined-target">${event.target.namespace || 'N/A'}/${event.target.name || event.target.pod}</div>
                            <div class="combined-details">
                                <span>${label}</span>
                                <span class="combined-score ${getRiskClass(event.risk_score)}">Risk: ${formatRiskScore(event.risk_score)}</span>
                                <span>${formatTime(event.timestamp)}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                console.log('WebSocket connected');
                document.getElementById('connectionDot').classList.remove('disconnected');
                document.getElementById('connectionText').textContent = 'Connected';
                reconnectAttempts = 0;
                fetchStats();
                fetchEvents();
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                console.log('Received:', message.type);

                if (message.type === 'stats') {
                    const stats = message.data;
                    document.getElementById('healthEventCount').textContent = stats.total_health_events;
                    document.getElementById('securityEventCount').textContent = stats.total_security_events;
                    document.getElementById('highRiskHealth').textContent = stats.high_risk_health_events;
                    document.getElementById('highRiskSecurity').textContent = stats.high_risk_security_events;
                } else if (message.type === 'health_event' || message.type === 'security_event') {
                    fetchEvents(); // Refresh events on new ones
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                document.getElementById('connectionDot').classList.add('disconnected');
                document.getElementById('connectionText').textContent = 'Error';
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                document.getElementById('connectionDot').classList.add('disconnected');
                document.getElementById('connectionText').textContent = 'Disconnected';

                if (reconnectAttempts < maxReconnectAttempts) {
                    const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
                    setTimeout(() => {
                        reconnectAttempts++;
                        connectWebSocket();
                    }, delay);
                }
            };
        }

        // Initial load
        fetchStats();
        fetchEvents();

        // Connect WebSocket
        connectWebSocket();

        // Periodic refresh
        setInterval(fetchStats, 10000);
        setInterval(fetchEvents, 15000);
    </script>
    <script src="/static/event-details.js"></script>
</body>
</html>
