---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-kubeheal
  labels:
    app: dit-sec-testing
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: health-agent
  namespace: demo
  labels:
    app: health-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: health-agent
  labels:
    app: health-agent
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: health-agent
  labels:
    app: health-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: health-agent
subjects:
  - kind: ServiceAccount
    name: health-agent
    namespace: demo
