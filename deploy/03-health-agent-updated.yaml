---
apiVersion: v1
kind: Service
metadata:
  name: health-agent
  namespace: demo
  labels:
    app: health-agent
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: health-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-agent
  namespace: demo
  labels:
    app: health-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-agent
  template:
    metadata:
      labels:
        app: health-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: health-agent
      containers:
        - name: agent
          image: health-agent:v3-ditsec-embedded
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: REDIS_URL
              value: redis://redis-master.demo-kubeheal:6379
            - name: PROMETHEUS_URL
              value: http://prometheus.monitoring:9090
            - name: NAMESPACE
              value: demo
            - name: COOLDOWN_TTL
              value: "300"
            - name: LOG_LEVEL
              value: "INFO"
            - name: DITSEC_MODEL_PATH
              value: /app/models/dit_sec_v3_checkpoint.pth
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 2
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      nodeSelector:
        kubernetes.io/arch: amd64
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - drift-lab
                topologyKey: kubernetes.io/hostname
