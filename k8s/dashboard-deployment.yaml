apiVersion: v1
kind: Service
metadata:
  name: kubeheal-dashboard
  namespace: kubeheal
  labels:
    app: kubeheal-dashboard
spec:
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
  selector:
    app: kubeheal-dashboard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeheal-dashboard
  namespace: kubeheal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubeheal-dashboard
  template:
    metadata:
      labels:
        app: kubeheal-dashboard
    spec:
      serviceAccountName: kubeheal
      containers:
        - name: dashboard
          image: kubeheal/dashboard:v4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: REDIS_URL
              value: redis://redis-master:6379
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
      nodeSelector:
        kubernetes.io/arch: amd64