apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeheal-dcm
  namespace: kubeheal
  labels: {app: kubeheal-dcm, version: v4.0.0}
spec:
  replicas: 1
  selector: {matchLabels: {app: kubeheal-dcm}}
  template:
    metadata: {labels: {app: kubeheal-dcm}}
    spec:
      serviceAccountName: kubeheal
      containers:
      - name: dcm-server
        image: kubeheal/dcm-server:v4
        imagePullPolicy: IfNotPresent
        ports: [{containerPort: 8003, name: http}]
        env:
        - {name: MODEL_PATH, value: /models/dcm/checkpoints/best_dcm.pt}
        - name: ANTHROPIC_API_KEY
          valueFrom: {secretKeyRef: {name: kubeheal-secrets, key: anthropic-api-key, optional: true}}
        resources:
          requests: {cpu: "200m", memory: "256Mi"}
          limits: {cpu: "500m", memory: "512Mi"}
        readinessProbe: {httpGet: {path: /health, port: 8003}, initialDelaySeconds: 10, periodSeconds: 5}
        livenessProbe: {httpGet: {path: /health, port: 8003}, initialDelaySeconds: 20, periodSeconds: 10}
      nodeSelector: {kubernetes.io/arch: amd64}
---
apiVersion: v1
kind: Service
metadata: {name: kubeheal-dcm, namespace: kubeheal}
spec:
  selector: {app: kubeheal-dcm}
  ports: [{port: 8003, targetPort: 8003, name: http}]
