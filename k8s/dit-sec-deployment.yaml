apiVersion: v1
kind: Service
metadata:
  name: dit-sec-server
  namespace: kubeheal
  labels:
    app: dit-sec-server
spec:
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: dit-sec-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dit-sec-server
  namespace: kubeheal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dit-sec-server
  template:
    metadata:
      labels:
        app: dit-sec-server
    spec:
      serviceAccountName: kubeheal
      containers:
        - name: server
          image: kubeheal/dit-sec-server:v3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MODEL_PATH
              value: /models/dit_sec_v3.onnx
            - name: REDIS_URL
              value: redis://redis-master:6379
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
      nodeSelector:
        kubernetes.io/arch: amd64
