apiVersion: v1
kind: Service
metadata:
  name: dit-sec-server
  namespace: kubeheal
  labels:
    app: dit-sec-server
spec:
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: dit-sec-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dit-sec-server
  namespace: kubeheal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dit-sec-server
  template:
    metadata:
      labels:
        app: dit-sec-server
    spec:
      serviceAccountName: kubeheal
      containers:
        - name: server
          image: kubeheal/dit-sec-server:v3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MODEL_PATH
              value: /models/dit_sec_v3.onnx
            - name: REDIS_URL
              value: redis://redis-master:6379
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
      nodeSelector:
        kubernetes.io/arch: amd64
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dit-sec-server
  namespace: kubeheal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dit-sec-server
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80