# Falco config + KubeHeal ransomware rules.
# Install Falco itself via Helm with this config (see scripts/install.sh):
#   helm install falco falcosecurity/falco -n falco --create-namespace \
#     --set driver.kind=ebpf \
#     --set-file customRules."kubeheal_rules\.yaml"=k8s/falco-kubeheal-rules.yaml \
#     --set falco.json_output=true --set falco.file_output.enabled=true \
#     --set falco.file_output.filename=/var/run/falco/events.jsonl
#
# Falco writes one JSON event per line to /var/run/falco/events.jsonl on each
# node (hostPath). The KubeHeal Security Agent DaemonSet mounts the same path
# read-only and tails it (FALCO_ENABLED=true, FALCO_EVENTS_PATH).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubeheal-falco-rules
  namespace: falco
data:
  kubeheal_rules.yaml: |
    # Ransomware-behaviour rules feeding KubeHeal's Security Model.
    - macro: pv_write
      condition: (evt.type in (write,pwrite,pwritev,ftruncate,truncate) and fd.name startswith /data)

    - macro: rename_op
      condition: (evt.type in (rename,renameat,renameat2))

    - rule: KubeHeal Ransomware Mass Rename
      desc: Burst of file renames on a PersistentVolume (file-locking pattern)
      condition: rename_op and fd.name startswith /data and container
      output: "kubeheal_ransomware rename burst (pid=%proc.pid file=%fd.name pod=%k8s.pod.name ns=%k8s.ns.name)"
      priority: WARNING
      tags: [ransomware, kubeheal]

    - rule: KubeHeal Ransomware Mass Write
      desc: High-rate writes/truncates on a PersistentVolume (in-place encryption)
      condition: pv_write and container
      output: "kubeheal_ransomware pv write (pid=%proc.pid file=%fd.name pod=%k8s.pod.name ns=%k8s.ns.name)"
      priority: WARNING
      tags: [ransomware, kubeheal]

    - rule: KubeHeal Ransom Note Dropped
      desc: A ransom-note style file was created
      condition: evt.type in (open,openat,creat) and (fd.name contains DECRYPT or fd.name contains README_DECRYPT or fd.name endswith .locked or fd.name endswith .encrypted)
      output: "kubeheal_ransomware note dropped (pid=%proc.pid file=%fd.name pod=%k8s.pod.name ns=%k8s.ns.name)"
      priority: CRITICAL
      tags: [ransomware, kubeheal]
