apiVersion: v1
kind: Service
metadata:
  name: fusion-agent
  namespace: kubeheal
  labels:
    app: fusion-agent
spec:
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app: fusion-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fusion-agent
  namespace: kubeheal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fusion-agent
  template:
    metadata:
      labels:
        app: fusion-agent
    spec:
      serviceAccountName: kubeheal
      containers:
        - name: agent
          image: kubeheal/fusion-agent:v3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: REDIS_URL
              value: redis://redis-master:6379
            - name: NAMESPACE
              value: kubeheal
            - name: MAX_AUTO_KILL_PER_NS_PER_HOUR
              value: "3"
            - name: MAX_AUTO_PATCH_PER_DEP_PER_HOUR
              value: "10"
            - name: CI_WIDTH_THRESHOLD
              value: "0.15"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
      nodeSelector:
        kubernetes.io/arch: amd64