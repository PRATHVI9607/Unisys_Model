apiVersion: v1
kind: Service
metadata:
  name: health-agent
  namespace: kubeheal
  labels:
    app: health-agent
spec:
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: health-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-agent
  namespace: kubeheal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-agent
  template:
    metadata:
      labels:
        app: health-agent
    spec:
      serviceAccountName: kubeheal
      containers:
        - name: agent
          image: kubeheal/health-agent:v3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: REDIS_URL
              value: redis://redis-master:6379
            - name: DIT_SEC_URL
              value: http://dit-sec-server:8000
            - name: PROMETHEUS_URL
              value: http://prometheus:9090
            - name: NAMESPACE
              value: kubeheal
            - name: COOLDOWN_TTL
              value: "300"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      nodeSelector:
        kubernetes.io/arch: amd64