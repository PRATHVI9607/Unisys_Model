apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kubeheal-scrape-config
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      kubeheal.io/scrape: "true"
  namespaceSelector:
    matchNames:
      - kubeheal
      - demo
  endpoints:
    - port: http
      interval: 5s
      path: /metrics
      scheme: http
      tlsConfig:
        insecureSkipVerify: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-kubeheal-rules
  namespace: monitoring
data:
  kubeheal-alerts.yaml: |
    groups:
      - name: kubeheal.rules
        rules:
          - alert: HighRiskScore
            expr: kubeheal_risk_score > 0.85
            for: 30s
            labels:
              severity: critical
              component: kubeheal
            annotations:
              summary: "KubeHeal detected high risk event"
              description: "Risk score {{ $value }} for {{ $labels.target }}"
          
          - alert: RansomwareDetected
            expr: kubeheal_risk_score > 0.93
            for: 5s
            labels:
              severity: critical
              component: kubeheal
            annotations:
              summary: "Ransomware detected"
              description: "Critical ransomware activity detected"
          
          - alert: AutoPatchFailure
            expr: kubeheal_auto_patch_duration_seconds > 120
            for: 60s
            labels:
              severity: warning
              component: kubeheal
            annotations:
              summary: "Auto-patch taking too long"
              description: "Auto-patch for {{ $labels.target }} taking > 2 minutes"
          
          - alert: CircuitBreakerOpen
            expr: kubeheal_circuit_breaker_count > 3
            for: 1m
            labels:
              severity: warning
              component: kubeheal
            annotations:
              summary: "Circuit breaker deployed"
              description: "Circuit breaker triggered for {{ $labels.namespace }}"
          
          - alert: AgentDown
            expr: up{job="kubeheal-agents"} == 0
            for: 1m
            labels:
              severity: critical
              component: kubeheal
            annotations:
              summary: "KubeHeal agent down"
              description: "{{ $labels.job }} has been down for 1 minute"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-kubeheal-scrape-config
  namespace: monitoring
data:
  config.yaml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 2s
      external_labels:
        cluster: 'minikube'
        environment: 'development'
    
    scrape_configs:
      - job_name: 'kubeheal-health-agent'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - kubeheal
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: health-agent
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
        
      - job_name: 'kubeheal-security-agent'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - kubeheal
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: security-agent
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
        
      - job_name: 'kubeheal-fusion-agent'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - kubeheal
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: fusion-agent
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
        
      - job_name: 'kubeheal-demo-namespaces'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - demo
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: demo
          - action: replace
            regex: (.*)
            source_labels:
              - __meta_kubernetes_pod_label_app
            target_label: app
        
      - job_name: 'kubelet'
        scheme: https
        kubernetes_sd_configs:
          - role: node
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
        
      - job_name: 'kube-state-metrics'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_name]
            action: keep
            regex: prometheus-kube-state-metrics-.*