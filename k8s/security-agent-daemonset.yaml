apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: security-agent
  namespace: kubeheal
spec:
  selector:
    matchLabels:
      app: security-agent
  template:
    metadata:
      labels:
        app: security-agent
    spec:
      serviceAccountName: kubeheal
      hostPID: true          # see host PIDs so /proc/<pid> + os.kill target real procs
      containers:
        - name: agent
          image: kubeheal/security-agent:v4
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: false
            runAsUser: 0
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              # SYS_PTRACE: read /proc/<pid>/mem for mmap entropy
              # DAC_READ_SEARCH: read files across container boundaries
              # KILL: os.kill() ransomware processes owned by other UIDs
              add: ["SYS_PTRACE", "DAC_READ_SEARCH", "KILL"]
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PROC_ROOT
              value: /proc
            - name: REDIS_URL
              value: redis://redis-master:6379
            - name: SECURITY_MODEL_URL
              value: http://kubeheal-security-model:8002
            - name: ENTROPY_THRESHOLD
              value: "7.2"
            - name: MMAP_ENTROPY_THRESHOLD
              value: "7.0"
            - name: WRITE_BYTES_THRESHOLD
              value: "10485760"        # 10 MiB / 2s window
            # Falco: set true once Falco is installed (see k8s/falco.yaml).
            # When false, detection runs off the /proc write-byte tracker.
            - name: FALCO_ENABLED
              value: "false"
            - name: FALCO_EVENTS_PATH
              value: /var/run/falco/events.jsonl
            - name: NAMESPACE
              value: kubeheal
            - name: LOG_LEVEL
              value: "INFO"
          livenessProbe:
            exec:
              command: ["python", "-c", "import redis,os; redis.from_url(os.environ['REDIS_URL']).ping()"]
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: falco-events     # Falco's JSON output (shared, read-only)
              mountPath: /var/run/falco
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: sys
          hostPath:
            path: /sys
        - name: falco-events
          hostPath:
            path: /var/run/falco
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
      nodeSelector:
        kubernetes.io/arch: amd64
