[pytest]
# Silence known, non-actionable third-party deprecation/info warnings so the
# suite output stays readable. These originate inside torch / torch_geometric /
# their AST tooling — not KubeHeal code. Our own warnings still surface.
filterwarnings =
    ignore:enable_nested_tensor is True:UserWarning
    ignore:`torch_geometric.distributed` has been deprecated:DeprecationWarning
    ignore:Attribute s is deprecated:DeprecationWarning
    ignore:ast.Str is deprecated:DeprecationWarning
    ignore:ast.NameConstant is deprecated:DeprecationWarning
    ignore:ast.Num is deprecated:DeprecationWarning
